name: trialscope
version: '1.0.0'
config-version: 2

profile: trialscope

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
docs-paths: ["docs"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  trialscope:
    staging:
      +schema: staging
      +materialized: incremental
    marts:
      +schema: marts
      +materialized: table

vars:
  start_year: 2000
